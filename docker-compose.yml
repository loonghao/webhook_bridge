version: '3.8'

services:
  webhook-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
      - "50052:50052"
    volumes:
      - ./config.4.0.yaml:/app/config.4.0.yaml:ro
      - ./example_plugins:/app/example_plugins:ro
      - ./plugins:/app/plugins
      - ./data:/app/data
    restart: unless-stopped
    command: ["webhook-bridge", "run", "--config", "config.4.0.yaml"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    image: node:22-bookworm-slim
    working_dir: /app
    profiles:
      - dev
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://webhook-bridge:8080
    volumes:
      - ./web-nextjs:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - webhook-bridge
