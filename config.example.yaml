# Webhook Bridge 4.0 example configuration.
# Copy to config.local.yaml for local overrides, or run with config.4.0.yaml.

server:
  host: "0.0.0.0"
  port: 8080
  request_timeout_secs: 30
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3002"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:3002"

python:
  interpreter: "python"
  interpreter_strategy: "managed"
  environment_manager: "uv"
  uv_project_dir: "."
  managed_runtime_dir: "data/python"
  allow_system_fallback: true
  executor_module: "python_executor.main"
  auto_start: true
  plugin_dirs:
    - "example_plugins"
    - "plugins"

executor:
  host: "127.0.0.1"
  port: 50051
  workers: 2
  connect_timeout_secs: 5

gateway:
  enabled: true
  public_path: "/gateway"
  default_route: ""
  provider_routes:
    github: "github-fanout"
    gitlab: "gitlab"
    sentry: "sentry"

scripts:
  enabled: true
  groups:
    - name: "github-fanout"
      enabled: true
      mode: "parallel"
      routes:
        - "github-save-json"
        - "github-wechat"
  routes:
    - name: "github-save-json"
      shell: "powershell"
      script_path: "scripts/save-github-hook.ps1"
      working_dir: "."
      enabled: true
      timeout_secs: 30
      env:
        WEBHOOK_BRIDGE_OUTPUT_DIR: "data/github-hooks"
    - name: "github-wechat"
      shell: "python"
      script_path: "scripts/notify-wechat.py"
      working_dir: "."
      enabled: false
      timeout_secs: 30
      env:
        WEBHOOK_BRIDGE_WECHAT_WEBHOOK_URL: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=00000000-0000-0000-0000-000000000000"

forwarding:
  enabled: true
  routes: []

storage:
  sqlite_path: "data/webhook-bridge.db"

dashboard:
  enabled: true
  api_prefix: "/api/dashboard"

logging:
  level: "info"
  format: "text"
