# Development tasks for Webhook Bridge 4.0

version: '3'

vars:
  BRIDGE_BINARY: '{{if eq OS "windows"}}webhook-bridge.exe{{else}}webhook-bridge{{end}}'

tasks:
  install:
    desc: Install Python executor dependencies
    cmds:
      - python -m pip install -r python_executor/requirements.txt
      - cd web-nextjs && npm install

  build:
    desc: Build the Rust bridge binary
    cmds:
      - cargo build -p webhook-bridge-server --bin webhook-bridge

  release:
    desc: Build the release bridge binary
    cmds:
      - cargo build --release -p webhook-bridge-server --bin webhook-bridge

  test:
    desc: Run Rust and Python tests
    cmds:
      - cargo test
      - python -m pytest

  lint:
    desc: Run frontend checks
    cmds:
      - cargo fmt --check
      - cd web-nextjs && npm run type-check
      - cd web-nextjs && npm run lint

  dev:
    desc: Run the Rust API with managed Python workers
    cmds:
      - cargo run -p webhook-bridge-server --bin webhook-bridge -- run --config config.4.0.yaml

  clean:
    desc: Clean local build artifacts
    cmds:
      - cargo clean
      - rm -f *.log *.pid
      - rm -rf build/ dist/
