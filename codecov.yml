# Codecov configuration for Webhook Bridge 4.0

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 75%
        threshold: 2%
        base: auto
        informational: true
      rust:
        target: 75%
        threshold: 2%
        informational: true
        paths:
          - "crates/"
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

github_checks:
  annotations: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes

ignore:
  - "build/"
  - "dist/"
  - "target/"
  - "*_pb2.py"
  - "*_pb2_grpc.py"
  - "noxfile.py"
  - "Makefile"
  - "scripts/"
  - "example_plugins/"
  - "*.yml"
  - "*.yaml"
  - "*.toml"
  - "*.json"
  - "Dockerfile"
  - "docker-compose.yml"
  - "*.md"
  - "docs/"

flags:
  rust:
    paths:
      - crates/
    carryforward: true
  python:
    paths:
      - python_executor/
      - webhook_bridge/
    carryforward: true
