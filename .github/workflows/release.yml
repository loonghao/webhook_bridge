name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            artifact: webhook-bridge-linux-x86_64
            exe: webhook-bridge
          - os: windows-latest
            target: windows-x86_64
            artifact: webhook-bridge-windows-x86_64.exe
            exe: webhook-bridge.exe
          - os: macos-latest
            target: darwin-arm64
            artifact: webhook-bridge-darwin-arm64
            exe: webhook-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python executor dependencies
        run: python -m pip install uv -r python_executor/requirements.txt

      - name: Test Rust workspace
        run: cargo test

      - name: Build single executable
        run: cargo build --release -p webhook-bridge-server --bin webhook-bridge

      - name: Stage executable
        shell: bash
        run: |
          mkdir -p release
          cp "target/release/${{ matrix.exe }}" "release/${{ matrix.artifact }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: release/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
